<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="優雅、清爽淡藍色主題的 React 待辦事項管理 Web 應用。">
  <title>我的待辦事項</title>
  
  <!-- Google Fonts 現代字型 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- React 18 & Babel Standalone (瀏覽器直接獨立運行) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 主主題樣式 -->
  <link rel="stylesheet" href="./src/index.css">
</head>
<body>
  <div id="root"></div>

  <!-- React 18 應用程式 -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STORAGE_KEY = 'taskflow_react_todos_v1';

    // 1. Header 元件
    const Header = () => (
      <header className="app-header">
        <div className="brand">
          <div className="brand-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="9 11 12 14 22 4"></polyline>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
          </div>
          <div className="brand-title">
            <h1>我的待辦事項</h1>
            <p>清爽淡藍風格 • React.js 數據驅動管理</p>
          </div>
        </div>
      </header>
    );

    // 2. ProgressCard 元件
    const ProgressCard = ({ total, completedCount, activeCount }) => {
      const percentage = total === 0 ? 0 : Math.round((completedCount / total) * 100);
      return (
        <section className="progress-card">
          <div className="progress-header">
            <div className="progress-info">
              <span className="progress-title">目前完成度</span>
              <span className="progress-percentage">{percentage}%</span>
            </div>
            <div className="stats-counters">
              <span className="counter-badge">{activeCount} 個項目待完成</span>
            </div>
          </div>
          <div className="progress-bar-bg">
            <div className="progress-bar-fill" style={{ width: `${percentage}%` }}></div>
          </div>
        </section>
      );
    };

    // 3. TodoForm 元件
    const TodoForm = ({ onAddTodo }) => {
      const [text, setText] = useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        const trimmed = text.trim();
        if (trimmed) {
          onAddTodo(trimmed);
          setText('');
        }
      };
      return (
        <section className="input-section">
          <form onSubmit={handleSubmit} className="todo-form">
            <div className="input-wrapper">
              <svg className="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
              </svg>
              <input 
                type="text" 
                className="todo-input" 
                placeholder="新增待辦事項... (按 Enter 或點擊新增)" 
                value={text}
                onChange={(e) => setText(e.target.value)}
                autoComplete="off"
                aria-label="新增待辦事項"
              />
              <button type="submit" className="btn btn-primary" aria-label="新增事項">
                <span>新增</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>
            </div>
          </form>
        </section>
      );
    };

    // 4. FilterTabs 元件
    const FilterTabs = ({ currentFilter, onFilterChange, totalCount, activeCount, completedCount, onClearCompleted }) => (
      <section className="toolbar-section">
        <div className="filter-tabs" role="tablist">
          <button type="button" className={`filter-tab ${currentFilter === 'all' ? 'active' : ''}`} onClick={() => onFilterChange('all')}>
            全部 <span className="badge">{totalCount}</span>
          </button>
          <button type="button" className={`filter-tab ${currentFilter === 'active' ? 'active' : ''}`} onClick={() => onFilterChange('active')}>
            未完成 <span className="badge">{activeCount}</span>
          </button>
          <button type="button" className={`filter-tab ${currentFilter === 'completed' ? 'active' : ''}`} onClick={() => onFilterChange('completed')}>
            已完成 <span className="badge">{completedCount}</span>
          </button>
        </div>
        <button 
          type="button" 
          className="btn btn-ghost" 
          onClick={onClearCompleted}
          style={{ opacity: completedCount > 0 ? 1 : 0.4, pointerEvents: completedCount > 0 ? 'auto' : 'none' }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          <span>清除已完成</span>
        </button>
      </section>
    );

    // 5. TodoItem 元件
    const TodoItem = ({ todo, onToggle, onDelete }) => {
      const [isRemoving, setIsRemoving] = useState(false);
      const handleDelete = (e) => {
        e.stopPropagation();
        setIsRemoving(true);
        setTimeout(() => onDelete(todo.id), 250);
      };
      return (
        <li className={`todo-item ${todo.completed ? 'completed' : ''} ${isRemoving ? 'removing' : ''}`} onClick={() => onToggle(todo.id)}>
          <div className="todo-content">
            <div className="custom-checkbox" role="checkbox" aria-checked={todo.completed}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span className="todo-text">{todo.text}</span>
          </div>
          <button type="button" className="delete-btn" onClick={handleDelete} title="刪除">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
        </li>
      );
    };

    // 6. TodoList 元件
    const TodoList = ({ todos, currentFilter, totalCount, onToggle, onDelete }) => {
      if (todos.length === 0) {
        let emptyTitle = '沒有待辦事項';
        let emptyDesc = '在上方輸入框新增第一個事項開始記錄吧！';
        if (totalCount > 0) {
          if (currentFilter === 'active') {
            emptyTitle = '太棒了！所有事項皆已完成';
            emptyDesc = '目前沒有任何未完成的待辦任務。';
          } else if (currentFilter === 'completed') {
            emptyTitle = '尚未有完成的事項';
            emptyDesc = '點擊事項邊緣的勾選框以完成第一個任務。';
          }
        }
        return (
          <main className="list-section">
            <div className="empty-state">
              <div className="empty-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
              </div>
              <h3>{emptyTitle}</h3>
              <p>{emptyDesc}</p>
            </div>
          </main>
        );
      }
      return (
        <main className="list-section">
          <ul className="todo-list">
            {todos.map((todo) => (
              <TodoItem key={todo.id} todo={todo} onToggle={onToggle} onDelete={onDelete} />
            ))}
          </ul>
        </main>
      );
    };

    // 7. App 主應用程式
    const App = () => {
      const [todos, setTodos] = useState(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          return stored ? JSON.parse(stored) : [];
        } catch (error) {
          return [];
        }
      });
      const [filter, setFilter] = useState('all');

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        } catch (error) {}
      }, [todos]);

      const handleAddTodo = (text) => {
        setTodos((prev) => [{ id: Date.now().toString(), text, completed: false, createdAt: new Date().toISOString() }, ...prev]);
      };

      const handleToggleTodo = (id) => {
        setTodos((prev) => prev.map((t) => (t.id === id ? { ...t, completed: !t.completed } : t)));
      };

      const handleDeleteTodo = (id) => {
        setTodos((prev) => prev.filter((t) => t.id !== id));
      };

      const handleClearCompleted = () => {
        setTodos((prev) => prev.filter((t) => !t.completed));
      };

      const totalCount = todos.length;
      const completedCount = todos.filter((t) => t.completed).length;
      const activeCount = totalCount - completedCount;

      const filteredTodos = todos.filter((t) => {
        if (filter === 'active') return !t.completed;
        if (filter === 'completed') return t.completed;
        return true;
      });

      return (
        <React.Fragment>
          <div className="bg-glow bg-glow-1"></div>
          <div className="bg-glow bg-glow-2"></div>
          <div className="app-container">
            <Header />
            <ProgressCard total={totalCount} completedCount={completedCount} activeCount={activeCount} />
            <TodoForm onAddTodo={handleAddTodo} />
            <FilterTabs 
              currentFilter={filter} 
              onFilterChange={setFilter} 
              totalCount={totalCount} 
              activeCount={activeCount} 
              completedCount={completedCount} 
              onClearCompleted={handleClearCompleted} 
            />
            <TodoList todos={filteredTodos} currentFilter={filter} totalCount={totalCount} onToggle={handleToggleTodo} onDelete={handleDeleteTodo} />
            <footer className="app-footer">
              <p>React 18.2 + LocalStorage 持久化 • 淡藍色主題</p>
            </footer>
          </div>
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
